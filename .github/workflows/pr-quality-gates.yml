name: PR Quality Gates

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - "*"
  workflow_dispatch:

# Repository variables used by this workflow:
# - PR_QA_ENABLED_JOBS: CSV list of optional jobs to run.
#   Supported values:
#   copyright-check,coding-standard,aggregate-linked-pr-checks
#   Note: mainline-alignment and detect-changes always run on pull_request.
# - PR_QA_CODING_STANDARD_ENABLED_CHECKS: CSV list of coding-standard sub-checks.
#   Empty or includes "all" => run all coding-standard sub-checks.
#   Supported values:
#   all,phpcs,phpcs-xml,phpcs-html,phpcs-graphql,phpcs-less,phpmd,phpstan,
#   phpcpd,strict-types,fixture-reuse,rector,eslint

jobs:
  # ──────────────────────────────────────────────────────────────────────
  # Pre-check: Detect which file types are present in the PR so that
  # language-specific jobs (PHPCS, ESLint, Rector) can skip entirely
  # when no relevant files were changed.
  # ──────────────────────────────────────────────────────────────────────
  detect-changes:
    needs: mainline-alignment
    if: >-
      github.event_name == 'pull_request' &&
      vars.PR_QA_ENABLED_JOBS != ''
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      has_php: ${{ steps.check.outputs.has_php }}
      has_js: ${{ steps.check.outputs.has_js }}
      has_static: ${{ steps.check.outputs.has_static }}
      has_new_files: ${{ steps.check.outputs.has_new_files }}
      has_copyright_files: ${{ steps.check.outputs.has_copyright_files }}
      copyright_files: ${{ steps.check.outputs.copyright_files }}
    steps:
      - name: Detect changed files and verify CI integrity
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          pr="${{ github.event.pull_request.number }}"
          repo="${{ github.repository }}"
          echo "PR #${pr}  ${{ github.event.pull_request.head.repo.full_name }} → ${{ github.event.pull_request.base.repo.full_name }}"
          echo "PR_QA_ENABLED_JOBS: ${{ vars.PR_QA_ENABLED_JOBS }}"

          # Fetch all changed files as "filename TAB status" pairs (paginated)
          files=$(gh api "repos/${repo}/pulls/${pr}/files" --paginate \
            --jq '.[] | [.filename, .status] | @tsv')

          # Verify required CI files are not removed in this PR
          required=(
            .github/workflows/pr-quality-gates.yml
            .github/scripts/check_copyright.py
            .github/scripts/copyright-template.txt
            .github/scripts/rector-compat.php
            .github/scripts/phpmd-ruleset.xml
            .github/scripts/phpstan.neon
            .github/scripts/phpstan-framework-autoload.php
            .github/scripts/phpstan-extensions.neon
            .github/scripts/filter-blacklist.sh
          )
          missing=false
          while IFS=$'\t' read -r filename status; do
            [[ "$status" != "removed" ]] && continue
            for req in "${required[@]}"; do
              if [[ "$filename" == "$req" ]]; then
                echo "::error::Required CI file removed: $filename"
                missing=true
              fi
            done
          done <<< "$files"
          if $missing; then echo "::error::Restore removed CI files before merging."; exit 1; fi

          # Categorize files (exclude .github/, vendor/, lib/web/)
          has_php=false; has_js=false; has_static=false
          has_new_files=false; has_copyright_files=false
          copyright_files=""
          copyright_exts='\.(php|phtml|js|css|scss|less|xml|xsd|html|graphqls)$'

          while IFS=$'\t' read -r filename status; do
            [[ -z "$filename" ]] && continue
            [[ "$filename" =~ ^(\.github|vendor|lib/web)/ ]] && continue
            [[ "$filename" =~ \.(php|phtml)$ ]]                                        && has_php=true
            [[ "$filename" =~ \.js$ && ! "$filename" =~ \.min\.js$ ]]                 && has_js=true
            [[ "$filename" =~ \.(xml|xsd|html|graphqls|less)$ ]]                      && has_static=true
            if [[ "$filename" =~ $copyright_exts && "$status" =~ ^(added|modified|renamed|copied)$ ]]; then
              has_copyright_files=true
              copyright_files+="${filename}"$'\n'
              [[ "$status" == "added" ]] && has_new_files=true
            fi
          done <<< "$files"
          copyright_files="${copyright_files%$'\n'}"

          echo "has_php=$has_php"                         >> "$GITHUB_OUTPUT"
          echo "has_js=$has_js"                           >> "$GITHUB_OUTPUT"
          echo "has_static=$has_static"                   >> "$GITHUB_OUTPUT"
          echo "has_new_files=$has_new_files"             >> "$GITHUB_OUTPUT"
          echo "has_copyright_files=$has_copyright_files" >> "$GITHUB_OUTPUT"
          {
            echo "copyright_files<<EOF"
            echo "$copyright_files"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          echo "PHP files changed: $has_php"
          echo "JS files changed: $has_js"
          echo "Static files changed: $has_static"
          echo "Copyright-eligible files changed: $has_copyright_files"

  # ──────────────────────────────────────────────────────────────────────
  # Job 2: Mainline Alignment (Branch Freshness + PR Gate)
  #
  # PRs live on a fork (e.g. adobe-commerce-tier-4/<repo>), but the
  # mainline lives on the upstream repo (magento-commerce/<repo>).
  # This job fetches the upstream mainline branch and verifies the PR
  # branch is rebased on its HEAD -- catching stale branches and merge
  # conflicts before expensive CI builds waste cycles.
  # ──────────────────────────────────────────────────────────────────────
  mainline-alignment:
    if: >-
      github.event_name == 'pull_request' &&
      vars.PR_QA_ENABLED_JOBS != ''
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    env:
      CROSS_REPO_READ_TOKEN: ${{ secrets.CROSS_REPO_READ_TOKEN }}
    steps:
      - name: Check branch alignment with upstream mainline
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          base_branch="${{ github.event.pull_request.base.ref }}"
          head_sha="${{ github.event.pull_request.head.sha }}"
          repo="${{ github.repository }}"
          owner="${repo%%/*}"
          echo "Base branch : ${base_branch}"
          echo "Head SHA    : ${head_sha}"

          # Resolve upstream (parent) repo; fall back to origin if not a fork
          upstream_owner="$owner"
          upstream_repo="${repo##*/}"
          upstream_label="$repo"
          meta=$(gh api "repos/${repo}" \
            --jq '[.fork, (.parent.owner.login // ""), (.parent.name // ""), (.parent.full_name // "")] | @tsv' \
            2>/dev/null || echo "false		")
          IFS=$'\t' read -r is_fork p_owner p_repo p_label <<< "$meta"
          if [[ "$is_fork" == "true" && -n "$p_owner" ]]; then
            upstream_owner="$p_owner"
            upstream_repo="$p_repo"
            upstream_label="$p_label"
            echo "Upstream    : ${upstream_label} (parent fork)"
          fi

          # Get upstream mainline HEAD SHA; fall back to origin on error
          if ! mainline_sha=$(gh api "repos/${upstream_owner}/${upstream_repo}/branches/${base_branch}" \
              --jq '.commit.sha' 2>/dev/null); then
            echo "::warning::Cannot reach ${upstream_label}/${base_branch}. Falling back to origin."
            upstream_owner="$owner"
            upstream_repo="${repo##*/}"
            upstream_label="$repo"
            mainline_sha=$(gh api "repos/${repo}/branches/${base_branch}" --jq '.commit.sha')
          fi
          echo "Mainline HEAD (${upstream_label} ${base_branch}): ${mainline_sha}"

          # ── 1. Freshness check ──────────────────────────────────────────
          cmp=$(gh api "repos/${repo}/compare/${mainline_sha}...${head_sha}" \
            --jq '[.behind_by, .ahead_by, .status, (.merge_base_commit.commit.committer.date // "")] | @tsv')
          IFS=$'\t' read -r behind ahead cmp_status merge_base_date <<< "$cmp"
          echo "Status: ${cmp_status}, behind_by: ${behind}, ahead_by: ${ahead}"

          if [[ "$behind" -gt 0 ]]; then
            if [[ "$upstream_owner" != "$owner" ]]; then
              fetch_cmd="git fetch upstream ${base_branch} && git merge upstream/${base_branch}"
            else
              fetch_cmd="git fetch origin ${base_branch} && git merge origin/${base_branch}"
            fi
            echo "::error::Branch is ${behind} commit(s) behind ${upstream_label} ${base_branch}.%0A%0AMerge the latest mainline before CI builds (PAT, MFTF, integration tests) will run.%0A%0ATo fix:%0A  ${fetch_cmd}%0A  git push"
            exit 1
          fi

          # ── 2. Conflict check ───────────────────────────────────────────
          mergeable=$(gh api "repos/${repo}/pulls/${{ github.event.pull_request.number }}" \
            --jq '.mergeable')
          if [[ "$mergeable" == "false" ]]; then
            echo "::error::Merge conflicts detected between this branch and ${upstream_label} ${base_branch}. Merge mainline and resolve conflicts before CI can proceed."
            exit 1
          fi
          [[ "$mergeable" == "null" ]] && echo "::warning::GitHub has not yet computed mergeability. Conflict check skipped."

          # ── 3. Staleness warning ────────────────────────────────────────
          if [[ -n "$merge_base_date" && "$merge_base_date" != "null" ]]; then
            now=$(date +%s)
            base_epoch=$(date -d "$merge_base_date" +%s 2>/dev/null || echo "")
            if [[ -n "$base_epoch" ]]; then
              age_days=$(( (now - base_epoch) / 86400 ))
              [[ "$age_days" -gt 7 ]] && echo "::warning::Branch diverged from ${upstream_label} ${base_branch} ${age_days} days ago. Consider rebasing."
              echo "Branch is up to date with ${upstream_label} ${base_branch} (diverged ${age_days} day(s) ago). All good."
            fi
          else
            echo "Branch is up to date with ${upstream_label} ${base_branch}. All good."
          fi

  # ──────────────────────────────────────────────────────────────────────
  # Job 4: Copyright Header Check
  #
  # Validates that changed files carry the correct Adobe copyright header
  # with the proper year (based on git creation date).
  # ──────────────────────────────────────────────────────────────────────
  copyright-check:
    needs:
      - mainline-alignment
      - detect-changes
    if: >-
      always() &&
      contains(format(',{0},', vars.PR_QA_ENABLED_JOBS), ',copyright-check,') &&
      github.event_name == 'pull_request' &&
      needs.mainline-alignment.result == 'success' &&
      needs.detect-changes.result == 'success' &&
      needs.detect-changes.outputs.has_copyright_files == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          filter: blob:none
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            /.github/
            ${{ needs.detect-changes.outputs.copyright_files }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install click==8.2.1

      - name: Check copyright headers (PR)
        if: github.event_name == 'pull_request'
        env:
          PR_CODE_FILES: ${{ needs.detect-changes.outputs.copyright_files }}
        run: |
          set -euo pipefail
          echo "Running copyright check in PR mode..."
          echo "Base SHA: ${{ github.event.pull_request.base.sha }}"
          echo "Head SHA: ${{ github.event.pull_request.head.sha }}"

          pr_code_files="$PR_CODE_FILES"

          echo "Relevant files in PR:"
          echo "$pr_code_files"

          if [ -z "$pr_code_files" ]; then
            echo "No code files changed in this PR"
            exit 0
          fi

          printf '%s\n' "$pr_code_files" | grep -v '^$' > /tmp/copyright_files.txt
          if ! python3 .github/scripts/check_copyright.py \
            --template "${GITHUB_WORKSPACE}/.github/scripts/copyright-template.txt" \
            --file-list /tmp/copyright_files.txt \
            --pr-mode \
            --base-sha "${{ github.event.pull_request.base.sha }}"; then
            echo "::error::Some PR files have copyright issues"
            exit 1
          fi


  # ──────────────────────────────────────────────────────────────────────
  # Job 5: Magento Coding Standard (PHPCS + Rector + ESLint)
  #
  # Clones magento/magento-coding-standard once and runs all three
  # tools from it, matching how the repo's own CI invokes them.
  # ──────────────────────────────────────────────────────────────────────
  coding-standard:
    needs: detect-changes
    if: >-
      contains(format(',{0},', vars.PR_QA_ENABLED_JOBS), ',coding-standard,') &&
      github.event_name == 'pull_request' &&
      (
        needs.detect-changes.outputs.has_php == 'true' ||
        needs.detect-changes.outputs.has_js == 'true' ||
        needs.detect-changes.outputs.has_static == 'true'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve PHP version from repository composer.json
        id: php-version
        env:
          REPO_NAME: ${{ github.event.repository.name }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: python3 .github/scripts/resolve_magento_tool_constraints.py

      - name: Setup PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # 2.37.0
        with:
          php-version: ${{ steps.php-version.outputs.php_version }}
          tools: composer
          extensions: simplexml, dom

      - name: Setup Node.js
        if: needs.detect-changes.outputs.has_js == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: '21'

      - name: Install Magento Coding Standard
        id: install-mcs
        run: |
          set -euo pipefail
          composer create-project --no-interaction --no-progress --stability=dev --remove-vcs magento/magento-coding-standard:dev-develop mcs
          cd mcs

          # PHPMD/PHPStan versions: same magento/magento2 composer.json as PHP version
          # resolution (quality-patches release → magento2 refs), written by the
          # "Resolve PHP version" step to /tmp/magento2-composer.json.
          if [ ! -f /tmp/magento2-composer.json ]; then
            echo "::error::Missing /tmp/magento2-composer.json — the Resolve PHP version step must run first."
            exit 1
          fi
          echo "Magento CE composer.json for tool pins (ref: ${{ steps.php-version.outputs.magento_composer_ref }})"

          phpmd_constraint=""
          phpstan_constraint=""
          for src in \
            "${GITHUB_WORKSPACE}/mcs/composer.json" \
            "/tmp/magento2-composer.json"; do
            [ -f "$src" ] || continue
            [ -z "$phpmd_constraint" ] && phpmd_constraint="$("${GITHUB_WORKSPACE}/.github/scripts/read-pkg-constraint.sh" "$src" "phpmd/phpmd" || true)"
            [ -z "$phpstan_constraint" ] && phpstan_constraint="$("${GITHUB_WORKSPACE}/.github/scripts/read-pkg-constraint.sh" "$src" "phpstan/phpstan" || true)"
            [ -n "$phpmd_constraint" ] && [ -n "$phpstan_constraint" ] && break
          done

          if [ -z "$phpmd_constraint" ] || [ -z "$phpstan_constraint" ]; then
            echo "::error::Could not resolve phpmd/phpmd or phpstan/phpstan from mcs/composer.json or /tmp/magento2-composer.json."
            exit 1
          fi
          echo "Resolved phpmd/phpmd constraint: $phpmd_constraint"
          echo "Resolved phpstan/phpstan constraint: $phpstan_constraint"

          npm install
          echo ""
          echo "PHPCS installed standards:"
          vendor/bin/phpcs -i

          cd ..
          mkdir -p qa-tools
          cd qa-tools
          composer init --name=local/qa-tools --no-interaction
          composer config minimum-stability dev
          composer config prefer-stable true
          composer require --dev --no-interaction --no-progress --with-all-dependencies \
            "phpmd/phpmd:${phpmd_constraint}" \
            "phpstan/phpstan:${phpstan_constraint}" \
            sebastian/phpcpd
          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Resolve enabled checks
        id: gate
        if: steps.install-mcs.outputs.ready == 'true'
        run: |
          set -euo pipefail
          ENABLED="${{ vars.PR_QA_CODING_STANDARD_ENABLED_CHECKS }}"
          is_enabled() {
            local check="$1"
            [ -z "$ENABLED" ] && echo "true" && return
            echo ",$ENABLED," | grep -qF ",all," && echo "true" && return
            echo ",$ENABLED," | grep -qF ",$check," && echo "true" && return
            echo "false"
          }
          for check in phpcs phpcs-xml phpcs-html phpcs-graphql phpcs-less phpmd phpstan phpcpd strict-types fixture-reuse rector eslint; do
            key="${check//-/_}"
            echo "${key}=$(is_enabled "$check")" >> "$GITHUB_OUTPUT"
          done

      - name: Print resolved tool version map
        run: |
          set -euo pipefail
          phpmd_mcs="$(.github/scripts/read-pkg-constraint.sh "${GITHUB_WORKSPACE}/mcs/composer.json" "phpmd/phpmd" || true)"
          phpstan_mcs="$(.github/scripts/read-pkg-constraint.sh "${GITHUB_WORKSPACE}/mcs/composer.json" "phpstan/phpstan" || true)"
          phpmd_m2="$(.github/scripts/read-pkg-constraint.sh "/tmp/magento2-composer.json" "phpmd/phpmd" || true)"
          phpstan_m2="$(.github/scripts/read-pkg-constraint.sh "/tmp/magento2-composer.json" "phpstan/phpstan" || true)"

          echo "=== Resolved Tool Version Map ==="
          echo "repo_name=${{ github.event.repository.name }}"
          echo "base_ref=${{ github.event.pull_request.base.ref }}"
          echo "magento_composer_ref=${{ steps.php-version.outputs.magento_composer_ref }}"
          echo "php_version=${{ steps.php-version.outputs.php_version }}"
          echo "phpmd_constraint_from_mcs=${phpmd_mcs:-<missing>}"
          echo "phpmd_constraint_from_magento2=${phpmd_m2:-<missing>}"
          echo "phpstan_constraint_from_mcs=${phpstan_mcs:-<missing>}"
          echo "phpstan_constraint_from_magento2=${phpstan_m2:-<missing>}"

      - name: Fetch Magento static PHPMD framework
        run: |
          set -euo pipefail
          ref="${{ steps.php-version.outputs.magento_composer_ref }}"
          if [ -z "$ref" ]; then
            ref="2.4-develop"
          fi

          target="/tmp/magento2-static"
          rm -rf "$target"
          git clone --depth 1 --filter=blob:none --sparse \
            --branch "$ref" \
            https://github.com/magento/magento2.git \
            "$target"
          cd "$target"
          git sparse-checkout set \
            dev/tests/static/framework \
            dev/tests/static/testsuite/Magento/Test/Php/_files/phpmd \
            dev/tests/static/testsuite/Magento/Test/Php/_files/phpcpd/blacklist \
            dev/tests/static/testsuite/Magento/Test/Php/_files/phpstan/blacklist \
            lib/internal/Magento/Framework

          echo "Fetched Magento static PHPMD framework from ref: $ref"

      - name: Get changed files
        id: files
        run: |
          set -euo pipefail
          base_ref="${{ github.event.pull_request.base.ref }}"
          base_sha="${{ github.event.pull_request.base.sha }}"
          head_sha="${{ github.event.pull_request.head.sha }}"
          pr_number="${{ github.event.pull_request.number }}"

          if ! git cat-file -e "${base_sha}^{commit}" 2>/dev/null; then
            git fetch origin "$base_ref" || true
            base_sha="origin/$base_ref"
          fi

          if ! git cat-file -e "${head_sha}^{commit}" 2>/dev/null; then
            git fetch origin "pull/${pr_number}/head:pr-${pr_number}-head" || true
            if git rev-parse --verify -q "pr-${pr_number}-head" >/dev/null; then
              head_sha="pr-${pr_number}-head"
            fi
          fi

          changed=$(git diff --name-only --diff-filter=ACMRT "$base_sha...$head_sha" \
            | grep -vE '^(\.github|vendor|lib/web)/' || true)
          added=$(git diff --name-only --diff-filter=A "$base_sha...$head_sha" \
            | grep -vE '^(\.github|vendor|lib/web)/' || true)

          php_files=$(echo "$changed"   | grep -E '\.(php|phtml)$'  || true)
          js_files=$(echo "$changed"    | grep -E '\.js$' | grep -v '\.min\.js$' || true)
          xml_files=$(echo "$changed"   | grep -E '\.(xml|xsd)$'    || true)
          html_files=$(echo "$changed"  | grep -E '\.html$'         || true)
          graphql_files=$(echo "$changed" | grep -E '\.graphqls$'   || true)
          less_files=$(echo "$changed"  | grep -E '\.less$'         || true)
          new_php=$(echo "$added"       | grep -E '\.php$'          || true)

          [ -n "$php_files" ] && echo "$php_files" > /tmp/changed_php.txt
          [ -n "$js_files" ] && echo "$js_files" > /tmp/changed_js.txt
          [ -n "$xml_files" ] && echo "$xml_files" > /tmp/changed_xml.txt
          [ -n "$html_files" ] && echo "$html_files" > /tmp/changed_html.txt
          [ -n "$graphql_files" ] && echo "$graphql_files" > /tmp/changed_graphqls.txt
          [ -n "$less_files" ] && echo "$less_files" > /tmp/changed_less.txt
          [ -n "$new_php" ] && echo "$new_php" > /tmp/new_php.txt

          echo "PHP files: $(echo "$php_files" | grep -c . || echo 0)"
          echo "JS files: $(echo "$js_files" | grep -c . || echo 0)"
          echo "XML/XSD files: $(echo "$xml_files" | grep -c . || echo 0)"
          echo "HTML files: $(echo "$html_files" | grep -c . || echo 0)"
          echo "GraphQL schema files: $(echo "$graphql_files" | grep -c . || echo 0)"
          echo "LESS files: $(echo "$less_files" | grep -c . || echo 0)"
          echo "New PHP files: $(echo "$new_php" | grep -c . || echo 0)"

      # ── PHPCS ─────────────────────────────────────────────────────

      - name: Run PHPCS
        if: always() && steps.gate.outputs.phpcs == 'true' && needs.detect-changes.outputs.has_php == 'true'
        run: |
          set -euo pipefail
          # Exclude Legacy sniffs that parse XML or load external data
          # files from the Magento project tree (not available on forks).
          EXCLUDE="Magento2.Legacy.ObsoleteConfigNodes"
          EXCLUDE="$EXCLUDE,Magento2.Legacy.Layout"
          EXCLUDE="$EXCLUDE,Magento2.Legacy.ObsoleteSystemConfiguration"
          EXCLUDE="$EXCLUDE,Magento2.Legacy.ObsoleteAcl"
          EXCLUDE="$EXCLUDE,Magento2.Legacy.ObsoleteMenu"
          EXCLUDE="$EXCLUDE,Magento2.Legacy.ClassReferencesInConfigurationFiles"
          EXCLUDE="$EXCLUDE,Magento2.Legacy.ModuleXML"
          EXCLUDE="$EXCLUDE,Magento2.Legacy.WidgetXML"
          EXCLUDE="$EXCLUDE,Magento2.Legacy.RestrictedCode"
          .github/scripts/run-phpcs.sh "PHP" /tmp/changed_php.txt "--exclude=$EXCLUDE"

      - name: Run PHPCS for XML/XSD
        if: always() && steps.gate.outputs.phpcs_xml == 'true' && needs.detect-changes.outputs.has_static == 'true'
        run: |
          set -euo pipefail
          .github/scripts/run-phpcs.sh "XML/XSD" /tmp/changed_xml.txt "--extensions=xml,xsd"

      - name: Run PHPCS for HTML
        if: always() && steps.gate.outputs.phpcs_html == 'true' && needs.detect-changes.outputs.has_static == 'true'
        run: |
          set -euo pipefail
          .github/scripts/run-phpcs.sh "HTML" /tmp/changed_html.txt

      - name: Run PHPCS for GraphQL
        if: always() && steps.gate.outputs.phpcs_graphql == 'true' && needs.detect-changes.outputs.has_static == 'true'
        run: |
          set -euo pipefail
          .github/scripts/run-phpcs.sh "GraphQL schema" /tmp/changed_graphqls.txt

      - name: Run PHPCS for LESS
        if: always() && steps.gate.outputs.phpcs_less == 'true' && needs.detect-changes.outputs.has_static == 'true'
        run: |
          set -euo pipefail
          .github/scripts/run-phpcs.sh "LESS" /tmp/changed_less.txt

      # ── Rector ────────────────────────────────────────────────────

      # ── PHPMD ────────────────────────────────────────────────────

      - name: Run PHPMD
        if: always() && steps.gate.outputs.phpmd == 'true' && needs.detect-changes.outputs.has_php == 'true'
        run: |
          set -euo pipefail
          if [ ! -f /tmp/changed_php.txt ] || [ ! -s /tmp/changed_php.txt ]; then
            echo "No PHP files to check, skipping phpmd."
            exit 0
          fi
          phpmd_bin="${GITHUB_WORKSPACE}/qa-tools/vendor/bin/phpmd"
          ruleset="/tmp/magento2-static/dev/tests/static/testsuite/Magento/Test/Php/_files/phpmd/ruleset.xml"
          prepend_file="/tmp/magento2-static/phpmd-prepend.php"
          if [ ! -f "$ruleset" ]; then
            echo "Magento ruleset not available, falling back to local standalone ruleset."
            ruleset="${GITHUB_WORKSPACE}/.github/scripts/phpmd-ruleset.xml"
          else
          else
            # Wrap the primary ruleset to exclude rules that require the full
            # vendor tree (Laminas etc.) and crash in the sparse-clone environment.
            wrapper="/tmp/phpmd-ruleset-ci.xml"
            cat > "$wrapper" <<XML
            <?xml version="1.0" encoding="UTF-8"?>
            <ruleset name="Magento PHPMD (CI)" xmlns="http://pmd.sf.net/ruleset/1.0.0"
                     xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                     xsi:schemaLocation="http://pmd.sf.net/ruleset/1.0.0 http://pmd.sf.net/ruleset_xml_schema.xsd">
                <description>Magento PHPMD rules, excluding rules that require the full vendor tree.</description>
                <rule ref="${ruleset}">
                    <exclude name="CookieAndSessionMisuse"/>
                    <exclude name="AllPurposeAction"/>
                </rule>
            </ruleset>
            XML
            ruleset="$wrapper"
          fi
          fi
          cat > "$prepend_file" <<'PHP'
          <?php
          $root = '/tmp/magento2-static';
          $traitFile = $root . '/lib/internal/Magento/Framework/GetParameterClassTrait.php';
          if (is_file($traitFile)) {
              require_once $traitFile;
          }
          spl_autoload_register(static function (string $class) use ($root): void {
              if (strpos($class, 'Magento\\') !== 0) {
                  return;
              }
              $relative = str_replace('\\', '/', $class) . '.php';
              foreach ([$root . '/lib/internal/', $root . '/app/code/'] as $base) {
                  $file = $base . $relative;
                  if (is_file($file)) {
                      require_once $file;
                      return;
                  }
              }
          });
          PHP

          mapfile -t files < <(while IFS= read -r f; do [ -f "$f" ] && printf '%s\n' "$f"; done < /tmp/changed_php.txt)

          # PHPMD 3.x: Symfony "analyze"; 2.x: legacy positional arguments.
          phpmd_symfony=false
          if $phpmd_bin list --raw 2>/dev/null | grep -qE '^analyze[[:space:]]'; then
            phpmd_symfony=true
          fi

          batch_size=20
          for ((i=0; i<${#files[@]}; i+=batch_size)); do
            batch_files=("${files[@]:i:batch_size}")
            batch_list=$(printf "%s," "${batch_files[@]}" | sed 's/,*$//')
            if [ "$phpmd_symfony" = true ]; then
              php -d auto_prepend_file="$prepend_file" "$phpmd_bin" analyze "${batch_files[@]}" \
                --format=text \
                --ruleset="$ruleset" \
                --suffixes=php --suffixes=phtml \
                --no-progress || exit $?
            else
              php -d auto_prepend_file="$prepend_file" "$phpmd_bin" \
                "$batch_list" \
                text \
                "$ruleset" \
                --suffixes=php,phtml || exit $?
            fi
          done

      # ── PHPStan ──────────────────────────────────────────────────

      - name: Generate Magento stubs for PHPStan
        if: always() && steps.gate.outputs.phpstan == 'true' && needs.detect-changes.outputs.has_php == 'true'
        run: |
          set -euo pipefail
          if [ ! -f /tmp/changed_php.txt ] || [ ! -s /tmp/changed_php.txt ]; then
            echo "No PHP files to check, skipping phpstan."
            exit 0
          fi
          bash .github/scripts/generate-stubs.sh /tmp/changed_php.txt

      - name: Run PHPStan
        if: always() && steps.gate.outputs.phpstan == 'true' && needs.detect-changes.outputs.has_php == 'true'
        run: |
          set -euo pipefail
          if [ ! -f /tmp/changed_php.txt ] || [ ! -s /tmp/changed_php.txt ]; then
            echo "No PHP files to check, skipping phpstan."
            exit 0
          fi

          blacklist_dir="/tmp/magento2-static/dev/tests/static/testsuite/Magento/Test/Php/_files/phpstan/blacklist"
          mapfile -t files_to_scan < <(.github/scripts/filter-blacklist.sh "$blacklist_dir" /tmp/changed_php.txt "PHPStan")

          if [ "${#files_to_scan[@]}" -eq 0 ]; then
            echo "No PHP files to analyze after blacklist filtering."
            exit 0
          fi

          # When the CE sparse clone is present, use phpstan-extensions.neon which
          # extends the base config with DataObjectClassReflectionExtension and
          # FilteredErrorFormatter. The extension classes are loaded via
          # --autoload-file, which PHPStan processes before building its DI
          # container (unlike bootstrapFiles, which run after container build).
          # When the sparse clone is absent, fall back to the base neon and the
          # plain table formatter — extensions are simply not registered.
          ext_class="/tmp/magento2-static/dev/tests/static/framework/Magento/PhpStan/Reflection/Php/DataObjectClassReflectionExtension.php"
          fmt_class="/tmp/magento2-static/dev/tests/static/framework/Magento/PhpStan/Formatters/FilteredErrorFormatter.php"

          if [ -f "$ext_class" ] && [ -f "$fmt_class" ]; then
            phpstan_neon="${GITHUB_WORKSPACE}/.github/scripts/phpstan-extensions.neon"
            autoload_flag="--autoload-file=${GITHUB_WORKSPACE}/.github/scripts/phpstan-framework-autoload.php"
            error_format="filtered"
          else
            phpstan_neon="${GITHUB_WORKSPACE}/.github/scripts/phpstan.neon"
            autoload_flag=""
            error_format="table"
          fi

          "${GITHUB_WORKSPACE}/qa-tools/vendor/bin/phpstan" analyse \
            $autoload_flag \
            --configuration="$phpstan_neon" \
            --no-progress \
            --error-format="$error_format" \
            "${files_to_scan[@]}"

      # ── PHPCPD ────────────────────────────────────────────────────

      - name: Run PHPCPD (Copy/Paste Detector)
        if: always() && steps.gate.outputs.phpcpd == 'true' && needs.detect-changes.outputs.has_php == 'true'
        run: |
          set -euo pipefail
          if [ ! -f /tmp/changed_php.txt ] || [ ! -s /tmp/changed_php.txt ]; then
            echo "No PHP files to check, skipping phpcpd."
            exit 0
          fi
          blacklist_dir="/tmp/magento2-static/dev/tests/static/testsuite/Magento/Test/Php/_files/phpcpd/blacklist"
          mapfile -t files_to_scan < <(.github/scripts/filter-blacklist.sh "$blacklist_dir" /tmp/changed_php.txt "PHPCPD")

          if [ "${#files_to_scan[@]}" -eq 0 ]; then
            echo "No PHP files left for PHPCPD after blacklist filtering."
            exit 0
          fi

          "${GITHUB_WORKSPACE}/qa-tools/vendor/bin/phpcpd" "${files_to_scan[@]}"

      # ── strict_types ──────────────────────────────────────────────

      - name: Check strict_types declaration
        if: always() && steps.gate.outputs.strict_types == 'true' && needs.detect-changes.outputs.has_php == 'true'
        run: |
          set -euo pipefail
          if [ ! -s /tmp/new_php.txt ]; then
            echo "No new PHP files to check."
            exit 0
          fi

          missing=""
          while IFS= read -r file; do
            if [ -n "$file" ] && [ -f "$file" ]; then
              if ! grep -q 'strict_types=1' "$file"; then
                missing="$missing\n  $file"
              fi
            fi
          done < /tmp/new_php.txt

          if [ -n "$missing" ]; then
            echo "::error::New PHP files missing declare(strict_types=1):"
            echo -e "$missing"
            exit 1
          fi
          echo "All new PHP files have strict_types declaration."

      - name: Check fixture reuse (static parity)
        if: always() && steps.gate.outputs.fixture_reuse == 'true' && needs.detect-changes.outputs.has_php == 'true'
        run: |
          set -euo pipefail
          if [ ! -f /tmp/changed_php.txt ] || [ ! -s /tmp/changed_php.txt ]; then
            echo "No PHP files to check, skipping fixture reuse."
            exit 0
          fi

          bad_files=""
          while IFS= read -r file; do
            [ -n "$file" ] || continue
            [ -f "$file" ] || continue
            if ! echo "$file" | grep -qE '^dev/tests/integration/.*/(_files|Fixtures)/'; then
              continue
            fi
            if grep -Pq '(?<![=\s*])\b(require|require_once|include)\b' "$file"; then
              bad_files="${bad_files}\n${file}"
            fi
          done < /tmp/changed_php.txt

          if [ -n "$bad_files" ]; then
            echo "::error::The following fixture files incorrectly reuse fixtures:"
            echo -e "$bad_files"
            echo "Use Magento\\TestFramework\\Workaround\\Override\\Fixture\\Resolver::requireDataFixture"
            exit 1
          fi
          echo "Fixture reuse check passed."

      # ── Rector ────────────────────────────────────────────────────

      - name: Run Rector
        if: always() && steps.gate.outputs.rector == 'true' && needs.detect-changes.outputs.has_php == 'true'
        env:
          RECTOR_PHP_VERSION: ${{ steps.php-version.outputs.php_version }}
        run: |
          set -euo pipefail
          if [ ! -f /tmp/changed_php.txt ] || [ ! -s /tmp/changed_php.txt ]; then
            echo "No PHP files to check, skipping rector."
            exit 0
          fi

          file_args=()
          while IFS= read -r file; do
            [ -n "$file" ] && [ -f "$file" ] && file_args+=("$GITHUB_WORKSPACE/$file")
          done < /tmp/changed_php.txt

          if [ ${#file_args[@]} -eq 0 ]; then
            echo "No PHP files to check."
            exit 0
          fi

          cd mcs
          vendor/bin/rector process \
            --config "$GITHUB_WORKSPACE/.github/scripts/rector-compat.php" \
            --dry-run \
            --autoload-file vendor/squizlabs/php_codesniffer/autoload.php \
            --autoload-file vendor/magento/php-compatibility-fork/PHPCSAliases.php \
            "${file_args[@]}"

      # ── ESLint ────────────────────────────────────────────────────

      - name: Run ESLint
        if: always() && steps.gate.outputs.eslint == 'true' && needs.detect-changes.outputs.has_js == 'true'
        run: |
          set -euo pipefail
          mapfile -t js_args < /tmp/changed_js.txt

          mcs/node_modules/.bin/eslint \
            -c mcs/eslint/eslint.config.mjs \
            "${js_args[@]}"

      - name: Validate generated XML test reports are non-empty
        if: always()
        run: |
          set -euo pipefail
          report_dir="${GITHUB_WORKSPACE}/build/test-reports"
          if [ ! -d "$report_dir" ]; then
            echo "No build/test-reports directory found; skipping XML report size check."
            exit 0
          fi

          shopt -s nullglob
          xml_reports=("$report_dir"/*.xml)
          shopt -u nullglob

          if [ "${#xml_reports[@]}" -eq 0 ]; then
            echo "No XML reports found in $report_dir; skipping XML report size check."
            exit 0
          fi

          has_empty=0
          for report in "${xml_reports[@]}"; do
            if [ ! -s "$report" ]; then
              echo "::error::Test report file is empty: $report"
              has_empty=1
            fi
          done

          if [ "$has_empty" -ne 0 ]; then
            echo "::error::One or more XML test report files are empty. This often means tests failed before writing JUnit output."
            exit 1
          fi
          echo "All discovered XML test reports are non-empty."

  # ──────────────────────────────────────────────────────────────────────
  # Final Job: Linked PR Aggregate Gate
  #
  # Runs after all PR quality jobs finish and validates linked PRs listed
  # in the PR description (Related PRs area).
  # ──────────────────────────────────────────────────────────────────────
  aggregate-linked-pr-checks:
    needs:
      - detect-changes
      - mainline-alignment
      - copyright-check
      - coding-standard
    if: >-
      contains(format(',{0},', vars.PR_QA_ENABLED_JOBS), ',aggregate-linked-pr-checks,') &&
      always() &&
      github.event_name == 'pull_request' &&
      contains(fromJSON('["success","failure"]'), needs.detect-changes.result) &&
      contains(fromJSON('["success","failure"]'), needs.mainline-alignment.result) &&
      contains(fromJSON('["success","failure","skipped"]'), needs.copyright-check.result) &&
      contains(fromJSON('["success","failure","skipped"]'), needs.coding-standard.result) &&
      vars.PR_QA_ENABLED_JOBS != ''
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      CROSS_REPO_READ_TOKEN: ${{ secrets.CROSS_REPO_READ_TOKEN }}
    permissions:
      contents: read
      pull-requests: read
      checks: read
      statuses: read
    steps:
      - name: Debug aggregate gate context
        run: |
          set -euo pipefail
          echo "detect-changes=${{ needs.detect-changes.result }}"
          echo "mainline-alignment=${{ needs.mainline-alignment.result }}"
          echo "copyright-check=${{ needs.copyright-check.result }}"
          echo "coding-standard=${{ needs.coding-standard.result }}"
          echo "PR_QA_ENABLED_JOBS='${{ vars.PR_QA_ENABLED_JOBS }}'"
          if [ -n "${CROSS_REPO_READ_TOKEN}" ]; then
            echo "CROSS_REPO_READ_TOKEN=present"
          else
            echo "CROSS_REPO_READ_TOKEN=missing"
          fi

      - name: Skip if cross-repo token is missing
        if: ${{ env.CROSS_REPO_READ_TOKEN == '' }}
        run: |
          set -euo pipefail
          echo "CROSS_REPO_READ_TOKEN is not set. Skipping aggregate-linked-pr-checks."
          exit 0

      - name: Validate linked PR checks
        if: ${{ env.CROSS_REPO_READ_TOKEN != '' }}
        uses: actions/github-script@v9
        with:
          github-token: ${{ env.CROSS_REPO_READ_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pr = context.payload.pull_request;
            const prNumber = pr.number;
            const body = pr.body || '';
            // Only scan the "Related Pull Requests" section, up to the placeholder comment.
            const sectionMatch = body.match(
              /###\s*Related Pull Requests\s*\n([\s\S]*?)(?=<!-- related pull request placeholder -->|\n###|$)/i
            );
            const section = (sectionMatch ? sectionMatch[1] : '').replace(/<!--[\s\S]*?-->/g, '');

            const linkRe = /https:\/\/github\.com\/([^/\s]+)\/([^/\s]+)\/pull\/(\d+)/g;
            const seen = new Set();
            const links = [];

            for (const m of section.matchAll(linkRe)) {
              const linkedOwner = m[1];
              const linkedRepo = m[2];
              const linkedPr = Number(m[3]);
              const key = `${linkedOwner}/${linkedRepo}#${linkedPr}`;
              if (seen.has(key)) continue;
              seen.add(key);

              if (linkedOwner === owner && linkedRepo === repo && linkedPr === prNumber) continue;
              if (linkedOwner !== owner) {
                core.notice(`Skipping ${key}: not in org ${owner}`);
                continue;
              }
              links.push({ owner: linkedOwner, repo: linkedRepo, number: linkedPr });
            }

            if (links.length === 0) {
              core.info('No linked PR URLs found in the Related Pull Requests section. Skipping aggregate gate.');
              return;
            }

            const okConclusions = new Set(['success', 'neutral', 'skipped']);
            const rows = [];
            let hasFailures = false;

            for (const link of links) {
              const label = `${link.owner}/${link.repo}#${link.number}`;
              try {
                const { data: linked } = await github.rest.pulls.get({
                  owner: link.owner,
                  repo: link.repo,
                  pull_number: link.number,
                });

                const sha = linked.head.sha;
                const prState = linked.state;

                const statusesResp = await github.rest.repos.listCommitStatusesForRef({
                  owner: link.owner,
                  repo: link.repo,
                  ref: sha,
                  per_page: 100,
                });
                const statuses = statusesResp.data || [];
                const badStatuses = statuses.filter(s => s.state !== 'success');

                const checksResp = await github.rest.checks.listForRef({
                  owner: link.owner,
                  repo: link.repo,
                  ref: sha,
                  per_page: 100,
                });
                const checkRuns = checksResp.data.check_runs || [];
                const badChecks = checkRuns.filter(c => c.status !== 'completed' || !okConclusions.has(c.conclusion || ''));

                const hasAnySignals = statuses.length > 0 || checkRuns.length > 0;
                const pass = prState === 'open' && hasAnySignals && badStatuses.length === 0 && badChecks.length === 0;

                if (!pass) hasFailures = true;

                rows.push({
                  pr: label,
                  state: prState,
                  totalStatuses: statuses.length,
                  failingStatuses: badStatuses.length,
                  totalChecks: checkRuns.length,
                  failingChecks: badChecks.length,
                  result: pass ? 'PASS' : 'FAIL',
                  error: null,
                });
              } catch (e) {
                hasFailures = true;
                rows.push({
                  pr: label,
                  state: 'unknown',
                  totalStatuses: 0,
                  failingStatuses: 0,
                  totalChecks: 0,
                  failingChecks: 0,
                  result: 'FAIL',
                  error: e.message,
                });
              }
            }

            const ciCell = r => {
              if (r.error) return `error: ${r.error}`;
              const parts = [];
              if (r.totalChecks > 0)
                parts.push(`${r.totalChecks} check run${r.totalChecks !== 1 ? 's' : ''}` +
                  (r.failingChecks > 0 ? `, ${r.failingChecks} failing` : ', all green'));
              if (r.totalStatuses > 0)
                parts.push(`${r.totalStatuses} status${r.totalStatuses !== 1 ? 'es' : ''}` +
                  (r.failingStatuses > 0 ? `, ${r.failingStatuses} failing` : ', all green'));
              return parts.length > 0 ? parts.join(' / ') : 'no signals';
            };

            // GitHub Actions summary: rendered as an HTML table
            await core.summary
              .addHeading('Linked PR Aggregate Report', 3)
              .addTable([
                ['Linked PR', 'State', 'CI', 'Result'].map(h => ({ data: h, header: true })),
                ...rows.map(r => [
                  r.pr,
                  r.state,
                  ciCell(r),
                  r.result === 'PASS' ? '✅ PASS' : '❌ FAIL',
                ]),
              ])
              .write();

            // Step log: plain text
            const logLines = rows.map(r =>
              `  ${r.result === 'PASS' ? '✅' : '❌'} ${r.pr}  [${r.state}]  ${ciCell(r)}`
            );
            const logReport = logLines.join('\n');

            if (hasFailures) {
              core.setFailed(`One or more linked PRs are not green:\n${logReport}`);
            } else {
              core.info(`All linked PRs are green:\n${logReport}`);
            }

