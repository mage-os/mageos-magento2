name: PR Quality Gates

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - "*"
  workflow_dispatch:

# Repository variables used by this workflow:
# - PR_QA_ENABLED_JOBS: CSV list of checks to run.
#   Supported values:
#   coding-standard,aggregate-linked-pr-checks
# - PR_QA_CODING_STANDARD_ENABLED_CHECKS: CSV list of coding-standard sub-checks.
#   Empty or includes "all" => run all coding-standard sub-checks.
#   Supported values:
#   all,phpcs,phpcs-xml,phpcs-html,phpcs-graphql,phpcs-less,phpmd,
#   strict-types,fixture-reuse,eslint,typescript

jobs:
  # ──────────────────────────────────────────────────────────────────────
  # Single job: mainline alignment + change detection + coding standard
  # + linked-PR aggregate gate, run sequentially so the PR shows one check.
  # ──────────────────────────────────────────────────────────────────────
  pr-quality-gates:
    if: >-
      github.event_name == 'pull_request' &&
      vars.PR_QA_ENABLED_JOBS != ''
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      pull-requests: read
      checks: read
      statuses: read
    env:
      CROSS_REPO_READ_TOKEN: ${{ secrets.CROSS_REPO_READ_TOKEN }}
    steps:

      # ── Mainline alignment ──────────────────────────────────────────
      - name: Check branch alignment with upstream mainline
        id: mainline
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          base_branch="${{ github.event.pull_request.base.ref }}"
          head_sha="${{ github.event.pull_request.head.sha }}"
          repo="${{ github.repository }}"
          owner="${repo%%/*}"
          echo "Base branch : ${base_branch}"
          echo "Head SHA    : ${head_sha}"

          # Resolve upstream (parent) repo; fall back to origin if not a fork
          upstream_owner="$owner"
          upstream_repo="${repo##*/}"
          upstream_label="$repo"
          meta=$(gh api "repos/${repo}" \
            --jq '[.fork, (.parent.owner.login // ""), (.parent.name // ""), (.parent.full_name // "")] | @tsv' \
            2>/dev/null || echo "false		")
          IFS=$'\t' read -r is_fork p_owner p_repo p_label <<< "$meta"
          if [[ "$is_fork" == "true" && -n "$p_owner" ]]; then
            upstream_owner="$p_owner"
            upstream_repo="$p_repo"
            upstream_label="$p_label"
            echo "Upstream    : ${upstream_label} (parent fork)"
          fi

          # Get upstream mainline HEAD SHA; fall back to origin on error
          if ! mainline_sha=$(gh api "repos/${upstream_owner}/${upstream_repo}/branches/${base_branch}" \
              --jq '.commit.sha' 2>/dev/null); then
            echo "::warning::Cannot reach ${upstream_label}/${base_branch}. Falling back to origin."
            upstream_owner="$owner"
            upstream_repo="${repo##*/}"
            upstream_label="$repo"
            mainline_sha=$(gh api "repos/${repo}/branches/${base_branch}" --jq '.commit.sha')
          fi
          echo "Mainline HEAD (${upstream_label} ${base_branch}): ${mainline_sha}"

          # ── 1. Freshness check ──────────────────────────────────────────
          cmp=$(gh api "repos/${repo}/compare/${mainline_sha}...${head_sha}" \
            --jq '[.behind_by, .ahead_by, .status, (.merge_base_commit.commit.committer.date // "")] | @tsv')
          IFS=$'\t' read -r behind ahead cmp_status merge_base_date <<< "$cmp"
          echo "Status: ${cmp_status}, behind_by: ${behind}, ahead_by: ${ahead}"

          if [[ "$behind" -gt 0 ]]; then
            if [[ "$upstream_owner" != "$owner" ]]; then
              fetch_cmd="git fetch upstream ${base_branch} && git merge upstream/${base_branch}"
            else
              fetch_cmd="git fetch origin ${base_branch} && git merge origin/${base_branch}"
            fi
            echo "::error::Branch is ${behind} commit(s) behind ${upstream_label} ${base_branch}.%0A%0AMerge the latest mainline before CI builds (PAT, MFTF, integration tests) will run.%0A%0ATo fix:%0A  ${fetch_cmd}%0A  git push"
            exit 1
          fi

          # ── 2. Conflict check ───────────────────────────────────────────
          mergeable=$(gh api "repos/${repo}/pulls/${{ github.event.pull_request.number }}" \
            --jq '.mergeable')
          if [[ "$mergeable" == "false" ]]; then
            echo "::error::Merge conflicts detected between this branch and ${upstream_label} ${base_branch}. Merge mainline and resolve conflicts before CI can proceed."
            exit 1
          fi
          [[ "$mergeable" == "null" ]] && echo "::warning::GitHub has not yet computed mergeability. Conflict check skipped."

          # ── 3. Staleness warning ────────────────────────────────────────
          if [[ -n "$merge_base_date" && "$merge_base_date" != "null" ]]; then
            now=$(date +%s)
            base_epoch=$(date -d "$merge_base_date" +%s 2>/dev/null || echo "")
            if [[ -n "$base_epoch" ]]; then
              age_days=$(( (now - base_epoch) / 86400 ))
              [[ "$age_days" -gt 7 ]] && echo "::warning::Branch diverged from ${upstream_label} ${base_branch} ${age_days} days ago. Consider rebasing."
              echo "Branch is up to date with ${upstream_label} ${base_branch} (diverged ${age_days} day(s) ago). All good."
            fi
          else
            echo "Branch is up to date with ${upstream_label} ${base_branch}. All good."
          fi

      # ── Detect changed files ────────────────────────────────────────
      - name: Detect changed files and verify CI integrity
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          pr="${{ github.event.pull_request.number }}"
          repo="${{ github.repository }}"
          echo "PR #${pr}  ${{ github.event.pull_request.head.repo.full_name }} → ${{ github.event.pull_request.base.repo.full_name }}"
          echo "PR_QA_ENABLED_JOBS: ${{ vars.PR_QA_ENABLED_JOBS }}"

          # Fetch all changed files as "filename TAB status" pairs (paginated)
          files=$(gh api "repos/${repo}/pulls/${pr}/files" --paginate \
            --jq '.[] | [.filename, .status] | @tsv')

          # Verify required CI files are not removed in this PR
          required=(
            .github/workflows/pr-quality-gates.yml
            .github/scripts/copyright-template.txt
            .github/scripts/phpmd-ruleset.xml
            .github/scripts/tslint.json
            .github/scripts/filter-blacklist.sh
          )
          missing=false
          while IFS=$'\t' read -r filename status; do
            [[ "$status" != "removed" ]] && continue
            for req in "${required[@]}"; do
              if [[ "$filename" == "$req" ]]; then
                echo "::error::Required CI file removed: $filename"
                missing=true
              fi
            done
          done <<< "$files"
          if $missing; then echo "::error::Restore removed CI files before merging."; exit 1; fi

          # Categorize files (exclude .github/, vendor/, lib/web/ except lib/web/mage/)
          # lib/web/ contains vendored third-party JS/CSS (jQuery, RequireJS, etc.)
          # lib/web/mage/ is Adobe-authored JS and is included.
          has_php=false; has_js=false; has_static=false; has_ts=false
          has_new_files=false; has_copyright_files=false
          copyright_files=""
          copyright_exts='\.(php|phtml|js|css|scss|less|xml|xsd|html|graphqls)$'
          count_new=0; count_modified=0; count_removed=0
          php_list=""; js_list=""; xml_list=""; html_list=""
          graphql_list=""; less_list=""; new_php_list=""; copyright_added_list=""
          ts_list=""

          while IFS=$'\t' read -r filename status; do
            [[ -z "$filename" ]] && continue
            [[ "$filename" =~ ^(\.github|vendor)/ ]] && continue
            [[ "$filename" =~ ^lib/web/ && ! "$filename" =~ ^lib/web/mage/ ]] && continue
            case "$status" in
              added)                    count_new=$((count_new + 1)) ;;
              modified|renamed|copied)  count_modified=$((count_modified + 1)) ;;
              removed)                  count_removed=$((count_removed + 1)) ;;
            esac
            [[ "$filename" =~ \.(php|phtml)$ ]]                                        && has_php=true
            [[ "$filename" =~ \.js$ && ! "$filename" =~ \.min\.js$ ]]                 && has_js=true
            [[ "$filename" =~ \.(xml|xsd|html|graphqls|less)$ ]]                      && has_static=true
            [[ "$filename" =~ \.ts$ && ! "$filename" =~ \.d\.ts$ ]]                   && has_ts=true
            if [[ "$status" =~ ^(added|modified|renamed|copied)$ ]]; then
              [[ "$filename" =~ \.(php|phtml)$ ]] && php_list+="${filename}"$'\n'
              [[ "$filename" =~ \.js$ && ! "$filename" =~ \.min\.js$ ]] && js_list+="${filename}"$'\n'
              [[ "$filename" =~ \.(xml|xsd)$ ]] && xml_list+="${filename}"$'\n'
              [[ "$filename" =~ \.html$ ]] && html_list+="${filename}"$'\n'
              [[ "$filename" =~ \.graphqls$ ]] && graphql_list+="${filename}"$'\n'
              [[ "$filename" =~ \.less$ ]] && less_list+="${filename}"$'\n'
              [[ "$filename" =~ \.php$ && "$status" == "added" ]] && new_php_list+="${filename}"$'\n'
              [[ "$filename" =~ \.ts$ && ! "$filename" =~ \.d\.ts$ ]] && ts_list+="${filename}"$'\n'
            fi
            if [[ "$filename" =~ $copyright_exts && "$status" =~ ^(added|modified|renamed|copied)$ ]]; then
              has_copyright_files=true
              copyright_files+="${filename}"$'\n'
              if [[ "$status" == "added" ]]; then
                has_new_files=true
                copyright_added_list+="${filename}"$'\n'
              fi
            fi
          done <<< "$files"
          copyright_files="${copyright_files%$'\n'}"

          # Write file lists for coding-standard checks (avoids git diff in later steps)
          [ -n "$php_list" ]             && printf '%s' "${php_list%$'\n'}"              > /tmp/changed_php.txt
          [ -n "$js_list" ]              && printf '%s' "${js_list%$'\n'}"               > /tmp/changed_js.txt
          [ -n "$xml_list" ]             && printf '%s' "${xml_list%$'\n'}"              > /tmp/changed_xml.txt
          [ -n "$html_list" ]            && printf '%s' "${html_list%$'\n'}"             > /tmp/changed_html.txt
          [ -n "$graphql_list" ]         && printf '%s' "${graphql_list%$'\n'}"          > /tmp/changed_graphqls.txt
          [ -n "$less_list" ]            && printf '%s' "${less_list%$'\n'}"             > /tmp/changed_less.txt
          [ -n "$new_php_list" ]         && printf '%s' "${new_php_list%$'\n'}"          > /tmp/new_php.txt
          [ -n "$copyright_files" ]      && printf '%s' "$copyright_files"               > /tmp/copyright_changed.txt
          [ -n "$copyright_added_list" ] && printf '%s' "${copyright_added_list%$'\n'}" > /tmp/copyright_added.txt
          [ -n "$ts_list" ]              && printf '%s' "${ts_list%$'\n'}"               > /tmp/changed_ts.txt

          echo "has_php=$has_php"                         >> "$GITHUB_OUTPUT"
          echo "has_js=$has_js"                           >> "$GITHUB_OUTPUT"
          echo "has_static=$has_static"                   >> "$GITHUB_OUTPUT"
          echo "has_ts=$has_ts"                           >> "$GITHUB_OUTPUT"
          echo "has_new_files=$has_new_files"             >> "$GITHUB_OUTPUT"
          echo "has_copyright_files=$has_copyright_files" >> "$GITHUB_OUTPUT"
          {
            echo "copyright_files<<EOF"
            echo "$copyright_files"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          count_total=$((count_new + count_modified + count_removed))
          echo "PHP files changed: $has_php"
          echo "JS files changed: $has_js"
          echo "Static files changed: $has_static"
          echo "TS files changed: $has_ts"
          echo "Copyright-eligible files changed: $has_copyright_files"
          echo "Files: ${count_total} total  |  ${count_new} new  |  ${count_modified} modified  |  ${count_removed} deleted"

      - name: Set file type env vars
        run: |
          echo "HAS_PHP=${{ steps.check.outputs.has_php }}"                          >> "$GITHUB_ENV"
          echo "HAS_JS=${{ steps.check.outputs.has_js }}"                            >> "$GITHUB_ENV"
          echo "HAS_STATIC=${{ steps.check.outputs.has_static }}"                    >> "$GITHUB_ENV"
          echo "HAS_TS=${{ steps.check.outputs.has_ts }}"                            >> "$GITHUB_ENV"
          echo "HAS_COPYRIGHT_FILES=${{ steps.check.outputs.has_copyright_files }}"  >> "$GITHUB_ENV"
          echo "HAS_PHP_OR_STATIC=${{ steps.check.outputs.has_php == 'true' || steps.check.outputs.has_static == 'true' }}" >> "$GITHUB_ENV"

      # ── Coding standard ─────────────────────────────────────────────
      - uses: actions/checkout@v6
        if: >-
          contains(format(',{0},', vars.PR_QA_ENABLED_JOBS), ',coding-standard,') &&
          (env.HAS_PHP == 'true' || env.HAS_JS == 'true' || env.HAS_STATIC == 'true' || env.HAS_TS == 'true')
        with:
          fetch-depth: 1
          filter: blob:none
          sparse-checkout: .github
          sparse-checkout-cone-mode: true

      - name: Resolve PHP version from repository composer.json
        id: php-version
        if: env.HAS_PHP_OR_STATIC == 'true'
        env:
          REPO_NAME: ${{ github.event.repository.name }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: python3 .github/scripts/resolve_magento_tool_constraints.py

      - name: Setup PHP
        if: env.HAS_PHP_OR_STATIC == 'true'
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # 2.37.0
        with:
          php-version: ${{ steps.php-version.outputs.php_version }}
          tools: composer
          extensions: simplexml, dom

      - name: Setup Node.js
        if: env.HAS_JS == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: '21'

      - name: Install Magento Coding Standard
        id: install-mcs
        if: >-
          contains(format(',{0},', vars.PR_QA_ENABLED_JOBS), ',coding-standard,') &&
          (env.HAS_PHP == 'true' || env.HAS_JS == 'true' || env.HAS_STATIC == 'true' || env.HAS_TS == 'true')
        run: |
          set -euo pipefail

          if [ "$HAS_PHP_OR_STATIC" = "true" ]; then
            composer create-project --no-interaction --no-progress --stability=dev --remove-vcs magento/magento-coding-standard:dev-develop mcs
            cd mcs && npm install && cd "${GITHUB_WORKSPACE}"

            echo "PHPCS installed standards:"
            mcs/vendor/bin/phpcs -i

            # PHPMD version: same magento/magento2 composer.json as PHP version
            # resolution (quality-patches release → magento2 refs), written by the
            # "Resolve PHP version" step to /tmp/magento2-composer.json.
            if [ ! -f /tmp/magento2-composer.json ]; then
              echo "::error::Missing /tmp/magento2-composer.json — the Resolve PHP version step must run first."
              exit 1
            fi
            echo "Magento CE composer.json for tool pins (ref: ${{ steps.php-version.outputs.magento_composer_ref }})"

            phpmd_constraint=""
            for src in \
              "${GITHUB_WORKSPACE}/mcs/composer.json" \
              "/tmp/magento2-composer.json"; do
              [ -f "$src" ] || continue
              [ -z "$phpmd_constraint" ] && phpmd_constraint="$("${GITHUB_WORKSPACE}/.github/scripts/read-pkg-constraint.sh" "$src" "phpmd/phpmd" || true)"
              [ -n "$phpmd_constraint" ] && break
            done

            if [ -z "$phpmd_constraint" ]; then
              echo "::error::Could not resolve phpmd/phpmd from mcs/composer.json or /tmp/magento2-composer.json."
              exit 1
            fi
            echo "Resolved phpmd/phpmd constraint: $phpmd_constraint"

            mkdir -p qa-tools
            cd qa-tools
            composer init --name=local/qa-tools --no-interaction
            composer config minimum-stability dev
            composer config prefer-stable true
            composer require --dev --no-interaction --no-progress --with-all-dependencies \
              "phpmd/phpmd:${phpmd_constraint}"
          elif [ "$HAS_JS" = "true" ]; then
            git clone --depth 1 --no-tags \
              https://github.com/magento/magento-coding-standard.git mcs
            cd mcs && npm install && cd "${GITHUB_WORKSPACE}"
          fi
          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Resolve enabled checks
        id: gate
        if: steps.install-mcs.outputs.ready == 'true'
        run: |
          set -euo pipefail
          ENABLED="${{ vars.PR_QA_CODING_STANDARD_ENABLED_CHECKS }}"
          is_enabled() {
            local check="$1"
            [ -z "$ENABLED" ] && echo "true" && return
            echo ",$ENABLED," | grep -qF ",all," && echo "true" && return
            echo ",$ENABLED," | grep -qF ",$check," && echo "true" && return
            echo "false"
          }
          for check in php-lint phpcs phpcs-xml xml-lint phpcs-html phpcs-graphql phpcs-less phpmd strict-types fixture-reuse eslint typescript; do
            key="${check//-/_}"
            echo "${key}=$(is_enabled "$check")" >> "$GITHUB_OUTPUT"
          done

      - name: Print resolved tool version map
        if: env.HAS_PHP_OR_STATIC == 'true'
        run: |
          set -euo pipefail
          phpmd_mcs="$(.github/scripts/read-pkg-constraint.sh "${GITHUB_WORKSPACE}/mcs/composer.json" "phpmd/phpmd" || true)"
          phpmd_m2="$(.github/scripts/read-pkg-constraint.sh "/tmp/magento2-composer.json" "phpmd/phpmd" || true)"

          echo "=== Resolved Tool Version Map ==="
          echo "repo_name=${{ github.event.repository.name }}"
          echo "base_ref=${{ github.event.pull_request.base.ref }}"
          echo "magento_composer_ref=${{ steps.php-version.outputs.magento_composer_ref }}"
          echo "php_version=${{ steps.php-version.outputs.php_version }}"
          echo "phpmd_constraint_from_mcs=${phpmd_mcs:-<missing>}"
          echo "phpmd_constraint_from_magento2=${phpmd_m2:-<missing>}"

      - name: Fetch Magento static PHPMD framework
        if: env.HAS_PHP_OR_STATIC == 'true' || env.HAS_JS == 'true'
        run: |
          set -euo pipefail
          ref="${{ steps.php-version.outputs.magento_composer_ref }}"
          if [ -z "$ref" ]; then
            ref="2.4-develop"
          fi
          target="/tmp/magento2-static"
          rm -rf "$target"
          git clone --depth 1 --filter=blob:none --sparse \
            --branch "$ref" \
            https://github.com/magento/magento2.git \
            "$target"
          cd "$target"
          git sparse-checkout set \
            dev/tests/static/framework \
            dev/tests/static/testsuite/Magento/Test/Php/_files/phpmd \
            lib/internal/Magento/Framework

          echo "Fetched Magento static PHPMD framework from ref: $ref"

      - name: Checkout changed files and fetch base commit
        id: files
        if: steps.install-mcs.outputs.ready == 'true'
        run: |
          set -euo pipefail
          base_sha="${{ github.event.pull_request.base.sha }}"
          echo "base_sha=$base_sha" >> "$GITHUB_ENV"
          git fetch --filter=blob:none --depth=1 origin "$base_sha" 2>/dev/null || true

          # Deduplicate across all file lists so each blob is fetched exactly once.
          # Use `cat "$f"; echo` to ensure a newline after each file's content —
          # without it, the last entry of one list concatenates with the first of the next.
          all_files=$(mktemp)
          for f in /tmp/changed_php.txt /tmp/changed_js.txt /tmp/changed_xml.txt \
                   /tmp/changed_html.txt /tmp/changed_graphqls.txt /tmp/changed_less.txt \
                   /tmp/changed_ts.txt /tmp/copyright_changed.txt; do
            [ -f "$f" ] || continue
            cat "$f"; echo
          done | sort -u | grep -v '^$' > "$all_files"

          checked_out=0
          while IFS= read -r file; do
            [ -n "$file" ] || continue
            tmp=$(mktemp)
            if git show "HEAD:${file}" > "$tmp" 2>/dev/null; then
              mkdir -p "$(dirname "$file")"
              mv "$tmp" "$file"
              checked_out=$((checked_out + 1))
            else
              rm -f "$tmp"
              echo "::warning::Could not fetch $file from HEAD (not at HEAD — removed in PR?)"
            fi
          done < "$all_files"
          rm -f "$all_files"
          echo "Checked out ${checked_out} changed file(s)."

      # ── PHP syntax lint ───────────────────────────────────────────

      - name: PHP syntax lint
        id: php-lint
        if: always() && steps.gate.outputs.php_lint == 'true' && env.HAS_PHP == 'true'
        run: |
          set -euo pipefail
          errors=0
          while IFS= read -r file; do
            [ -n "$file" ] || continue
            if ! php -l "$file" 2>&1; then
              errors=$((errors + 1))
            fi
          done < /tmp/changed_php.txt
          if [ "$errors" -gt 0 ]; then
            echo "::error::${errors} file(s) have PHP parse errors"
            exit 1
          fi
          echo "All PHP files passed syntax check."

      # ── PHPCS ─────────────────────────────────────────────────────

      - name: Run PHPCS
        id: phpcs
        if: always() && steps.gate.outputs.phpcs == 'true' && env.HAS_PHP == 'true'
        run: |
          set -euo pipefail
          # Exclude Legacy sniffs that parse XML or load external data
          # files from the Magento project tree (not available on forks).
          EXCLUDE="Magento2.Legacy.ObsoleteConfigNodes"
          EXCLUDE="$EXCLUDE,Magento2.Legacy.Layout"
          EXCLUDE="$EXCLUDE,Magento2.Legacy.ObsoleteSystemConfiguration"
          EXCLUDE="$EXCLUDE,Magento2.Legacy.ObsoleteAcl"
          EXCLUDE="$EXCLUDE,Magento2.Legacy.ObsoleteMenu"
          EXCLUDE="$EXCLUDE,Magento2.Legacy.ClassReferencesInConfigurationFiles"
          EXCLUDE="$EXCLUDE,Magento2.Legacy.ModuleXML"
          EXCLUDE="$EXCLUDE,Magento2.Legacy.WidgetXML"
          EXCLUDE="$EXCLUDE,Magento2.Legacy.RestrictedCode"
          .github/scripts/run-phpcs.sh "PHP" /tmp/changed_php.txt "--exclude=$EXCLUDE"

      - name: XML well-formedness lint
        id: xml-lint
        if: always() && steps.gate.outputs.xml_lint == 'true' && env.HAS_STATIC == 'true'
        run: |
          set -euo pipefail
          sudo apt-get install -y -q libxml2-utils 2>/dev/null
          errors=0
          while IFS= read -r file; do
            [ -n "$file" ] || continue
            if ! xmllint --noout "$file" 2>&1; then
              errors=$((errors + 1))
            fi
          done < /tmp/changed_xml.txt
          if [ "$errors" -gt 0 ]; then
            echo "::error::${errors} XML/XSD file(s) are not well-formed"
            exit 1
          fi
          echo "All XML/XSD files are well-formed."

      - name: Run PHPCS for XML/XSD
        id: phpcs-xml
        if: always() && steps.gate.outputs.phpcs_xml == 'true' && env.HAS_STATIC == 'true'
        run: |
          set -euo pipefail
          .github/scripts/run-phpcs.sh "XML/XSD" /tmp/changed_xml.txt "--extensions=xml,xsd"

      - name: Run PHPCS for HTML
        id: phpcs-html
        if: always() && steps.gate.outputs.phpcs_html == 'true' && env.HAS_STATIC == 'true'
        run: |
          set -euo pipefail
          .github/scripts/run-phpcs.sh "HTML" /tmp/changed_html.txt

      - name: Run PHPCS for GraphQL
        id: phpcs-graphql
        if: always() && steps.gate.outputs.phpcs_graphql == 'true' && env.HAS_STATIC == 'true'
        run: |
          set -euo pipefail
          .github/scripts/run-phpcs.sh "GraphQL schema" /tmp/changed_graphqls.txt

      - name: Run PHPCS for LESS
        id: phpcs-less
        if: always() && steps.gate.outputs.phpcs_less == 'true' && env.HAS_STATIC == 'true'
        run: |
          set -euo pipefail
          .github/scripts/run-phpcs.sh "LESS" /tmp/changed_less.txt

      # ── PHPMD ────────────────────────────────────────────────────

      - name: Run PHPMD
        id: phpmd
        if: always() && steps.gate.outputs.phpmd == 'true' && env.HAS_PHP == 'true'
        run: |
          set -euo pipefail
          if [ ! -f /tmp/changed_php.txt ] || [ ! -s /tmp/changed_php.txt ]; then
            echo "No PHP files to check, skipping phpmd."
            exit 0
          fi
          phpmd_bin="${GITHUB_WORKSPACE}/qa-tools/vendor/bin/phpmd"
          magento_ruleset="/tmp/magento2-static/dev/tests/static/testsuite/Magento/Test/Php/_files/phpmd/ruleset.xml"
          prepend_file="/tmp/magento2-static/phpmd-prepend.php"
          # Wrap the Magento ruleset to exclude rules that require the full
          # vendor tree (Laminas etc.) and crash in the sparse-clone environment.
          ruleset="/tmp/phpmd-ruleset-ci.xml"
          {
            printf '<?xml version="1.0" encoding="UTF-8"?>\n'
            printf '<ruleset name="Magento PHPMD (CI)" xmlns="http://pmd.sf.net/ruleset/1.0.0"\n'
            printf '         xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"\n'
            printf '         xsi:schemaLocation="http://pmd.sf.net/ruleset/1.0.0 http://pmd.sf.net/ruleset_xml_schema.xsd">\n'
            printf '  <description>Magento PHPMD rules, excluding rules that require the full vendor tree.</description>\n'
            printf '  <rule ref="%s">\n' "$magento_ruleset"
            printf '    <exclude name="CookieAndSessionMisuse"/>\n'
            printf '    <exclude name="AllPurposeAction"/>\n'
            printf '  </rule>\n'
            printf '</ruleset>\n'
          } > "$ruleset"
          cat > "$prepend_file" <<'PHP'
          <?php
          $root = '/tmp/magento2-static';
          $traitFile = $root . '/lib/internal/Magento/Framework/GetParameterClassTrait.php';
          if (is_file($traitFile)) {
              require_once $traitFile;
          }
          spl_autoload_register(static function (string $class) use ($root): void {
              if (strpos($class, 'Magento\\') !== 0) {
                  return;
              }
              $relative = str_replace('\\', '/', $class) . '.php';
              foreach ([$root . '/lib/internal/', $root . '/app/code/'] as $base) {
                  $file = $base . $relative;
                  if (is_file($file)) {
                      require_once $file;
                      return;
                  }
              }
          });
          PHP

          mapfile -t files < <(while IFS= read -r f; do [ -f "$f" ] && printf '%s\n' "$f"; done < /tmp/changed_php.txt)

          # PHPMD 3.x: Symfony "analyze"; 2.x: legacy positional arguments.
          phpmd_symfony=false
          if $phpmd_bin list --raw 2>/dev/null | grep -qE '^analyze[[:space:]]'; then
            phpmd_symfony=true
          fi

          phpmd_exit=0
          batch_size=20
          for ((i=0; i<${#files[@]}; i+=batch_size)); do
            batch_files=("${files[@]:i:batch_size}")
            batch_list=$(printf "%s," "${batch_files[@]}" | sed 's/,*$//')
            if [ "$phpmd_symfony" = true ]; then
              timeout 120 php -d auto_prepend_file="$prepend_file" -d memory_limit=512M \
                "$phpmd_bin" analyze "${batch_files[@]}" \
                --format=text \
                --ruleset="$ruleset" \
                --suffixes=php --suffixes=phtml \
                --no-progress 2>/dev/null || phpmd_exit=$?
            else
              timeout 120 php -d auto_prepend_file="$prepend_file" -d memory_limit=512M \
                "$phpmd_bin" \
                "$batch_list" \
                text \
                "$ruleset" \
                --suffixes=php,phtml 2>/dev/null || phpmd_exit=$?
            fi
            [ "$phpmd_exit" -ne 0 ] && break
          done
          if [ "$phpmd_exit" -eq 124 ]; then
            echo "::error::PHPMD batch timed out (120 s). The PR may have too many complex files for a single batch. Consider splitting the PR."
            exit 1
          fi
          if [ "$phpmd_exit" -eq 143 ]; then
            echo "::error::PHPMD was terminated by SIGTERM (exit 143). Possible cause: OOM or job timeout on a large PR."
            exit 1
          fi
          exit "$phpmd_exit"

      # ── strict_types ──────────────────────────────────────────────

      - name: Check strict_types declaration
        id: strict-types
        if: always() && steps.gate.outputs.strict_types == 'true' && env.HAS_PHP == 'true'
        run: |
          set -euo pipefail
          if [ ! -s /tmp/new_php.txt ]; then
            echo "No new PHP files to check."
            exit 0
          fi

          missing=""
          while IFS= read -r file; do
            if [ -n "$file" ] && [ -f "$file" ]; then
              if ! grep -q 'strict_types=1' "$file"; then
                missing="$missing\n  $file"
              fi
            fi
          done < /tmp/new_php.txt

          if [ -n "$missing" ]; then
            echo "::error::New PHP files missing declare(strict_types=1):"
            echo -e "$missing"
            exit 1
          fi
          echo "All new PHP files have strict_types declaration."

      - name: Check fixture reuse (static parity)
        id: fixture-reuse
        if: always() && steps.gate.outputs.fixture_reuse == 'true' && env.HAS_PHP == 'true'
        run: |
          set -euo pipefail
          if [ ! -f /tmp/changed_php.txt ] || [ ! -s /tmp/changed_php.txt ]; then
            echo "No PHP files to check, skipping fixture reuse."
            exit 0
          fi

          bad_files=""
          while IFS= read -r file; do
            [ -n "$file" ] || continue
            [ -f "$file" ] || continue
            if ! echo "$file" | grep -qE '^dev/tests/integration/.*/(_files|Fixtures)/'; then
              continue
            fi
            if grep -Pq '(?<![=\s*])\b(require|require_once|include)\b' "$file"; then
              bad_files="${bad_files}\n${file}"
            fi
          done < /tmp/changed_php.txt

          if [ -n "$bad_files" ]; then
            echo "::error::The following fixture files incorrectly reuse fixtures:"
            echo -e "$bad_files"
            echo "Use Magento\\TestFramework\\Workaround\\Override\\Fixture\\Resolver::requireDataFixture"
            exit 1
          fi
          echo "Fixture reuse check passed."

      # ── Copyright headers ─────────────────────────────────────────

      - name: Check copyright headers
        id: copyright
        if: always() && steps.install-mcs.outputs.ready == 'true' && env.HAS_COPYRIGHT_FILES == 'true'
        run: |
          set -euo pipefail
          if [ ! -f /tmp/copyright_changed.txt ] || [ ! -s /tmp/copyright_changed.txt ]; then
            echo "No copyright-eligible files — skipping."
            exit 0
          fi

          # Pre-fetch base versions so the PHP script needs no shell execution
          mkdir -p /tmp/copyright_base
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            mkdir -p "/tmp/copyright_base/$(dirname "$f")"
            git show "${base_sha}:${f}" > "/tmp/copyright_base/${f}" 2>/dev/null || true
          done < /tmp/copyright_changed.txt

          added_flag=""
          [ -f /tmp/copyright_added.txt ] && added_flag="--added /tmp/copyright_added.txt"

          php .github/scripts/check_copyright_pr.php \
            --files    /tmp/copyright_changed.txt \
            $added_flag \
            --base-dir /tmp/copyright_base \
            --template "${GITHUB_WORKSPACE}/.github/scripts/copyright-template.txt"

      # ── ESLint ────────────────────────────────────────────────────

      - name: Run ESLint
        id: eslint
        if: always() && steps.gate.outputs.eslint == 'true' && env.HAS_JS == 'true'
        run: |
          set -euo pipefail

          # Filter against Jenkins ESLint blacklist (blacklist files live in CE repo,
          # fetched via the PHPMD sparse-checkout above)
          bl="/tmp/magento2-static/dev/tests/static/testsuite/Magento/Test/Js/_files/blacklist"
          {
            cat "$bl/magento.txt" 2>/dev/null || true
            cat "$bl/ee.txt"      2>/dev/null || true
            cat "$bl/b2b.txt"     2>/dev/null || true
          } > /tmp/eslint_blacklist.txt

          mapfile -t js_args < <(python3 - /tmp/changed_js.txt /tmp/eslint_blacklist.txt <<'PYEOF'
          import fnmatch, sys
          with open(sys.argv[2]) as f:
              patterns = [l.strip() for l in f if l.strip() and not l.strip().startswith('//')]
          with open(sys.argv[1]) as f:
              files = [l.strip() for l in f if l.strip()]
          filtered = [fp for fp in files if not any(fnmatch.fnmatch(fp, p) for p in patterns)]
          print('\n'.join(filtered))
          PYEOF
          )

          if [ ${#js_args[@]} -eq 0 ]; then
            echo "All changed JS files are blacklisted — skipping ESLint."
            exit 0
          fi

          mcs/node_modules/.bin/eslint \
            -c mcs/eslint/eslint.config.mjs \
            "${js_args[@]}"

      # ── TypeScript ────────────────────────────────────────────────

      - name: Run TypeScript checks
        id: typescript
        if: always() && steps.gate.outputs.typescript == 'true' && env.HAS_TS == 'true'
        run: |
          set -euo pipefail
          npm install --prefix /tmp/ts-tools typescript tslint 2>/dev/null
          TSC=/tmp/ts-tools/node_modules/.bin/tsc
          TSLINT=/tmp/ts-tools/node_modules/.bin/tslint

          mapfile -t ts_files < /tmp/changed_ts.txt

          # Fetch tslint.json from HEAD if present (compiler options only — do not use
          # tsconfig.json include paths, which would try to compile the full project tree)
          _tmp=$(mktemp)
          if git show "HEAD:tslint.json" > "$_tmp" 2>/dev/null && [ -s "$_tmp" ]; then
            mv "$_tmp" tslint.json
            echo "Using repo tslint.json"
          else
            rm -f "$_tmp"
            cp .github/scripts/tslint.json tslint.json
            echo "Using bundled .github/scripts/tslint.json (repo has no tslint.json)"
          fi

          tslint_exit=0
          tsc_exit=0

          # tslint — mirrors npm run test:static:log
          "$TSLINT" --format stylish "${ts_files[@]}" || tslint_exit=$?

          # tsc --noEmit --noResolve — mirrors npm run test:errors:log
          # --noResolve skips import resolution so only the changed files are needed
          "$TSC" --noEmit --noResolve --allowSyntheticDefaultImports \
            --esModuleInterop --strict --target ES2020 \
            "${ts_files[@]}" || tsc_exit=$?

          [ "$tslint_exit" -gt 0 ] || [ "$tsc_exit" -gt 0 ] && exit 1 || true

      - name: Coding standard results summary
        if: always() && steps.install-mcs.outputs.ready == 'true'
        run: |
          {
            echo "## Coding Standard Results"
            echo "| Check | Status |"
            echo "|-------|--------|"
            echo "| PHP syntax lint | ${{ steps.php-lint.outcome      == 'success' && '✅' || steps.php-lint.outcome      == 'skipped' && '⏭️' || '❌' }} |"
            echo "| PHPCS PHP       | ${{ steps.phpcs.outcome        == 'success' && '✅' || steps.phpcs.outcome        == 'skipped' && '⏭️' || '❌' }} |"
            echo "| XML lint        | ${{ steps.xml-lint.outcome     == 'success' && '✅' || steps.xml-lint.outcome     == 'skipped' && '⏭️' || '❌' }} |"
            echo "| PHPCS XML/XSD   | ${{ steps.phpcs-xml.outcome    == 'success' && '✅' || steps.phpcs-xml.outcome    == 'skipped' && '⏭️' || '❌' }} |"
            echo "| PHPCS HTML      | ${{ steps.phpcs-html.outcome   == 'success' && '✅' || steps.phpcs-html.outcome   == 'skipped' && '⏭️' || '❌' }} |"
            echo "| PHPCS GraphQL   | ${{ steps.phpcs-graphql.outcome == 'success' && '✅' || steps.phpcs-graphql.outcome == 'skipped' && '⏭️' || '❌' }} |"
            echo "| PHPCS LESS      | ${{ steps.phpcs-less.outcome   == 'success' && '✅' || steps.phpcs-less.outcome   == 'skipped' && '⏭️' || '❌' }} |"
            echo "| PHPMD           | ${{ steps.phpmd.outcome        == 'success' && '✅' || steps.phpmd.outcome        == 'skipped' && '⏭️' || '❌' }} |"
            echo "| Strict types    | ${{ steps.strict-types.outcome == 'success' && '✅' || steps.strict-types.outcome == 'skipped' && '⏭️' || '❌' }} |"
            echo "| Fixture reuse   | ${{ steps.fixture-reuse.outcome == 'success' && '✅' || steps.fixture-reuse.outcome == 'skipped' && '⏭️' || '❌' }} |"
            echo "| Copyright       | ${{ steps.copyright.outcome    == 'success' && '✅' || steps.copyright.outcome    == 'skipped' && '⏭️' || '❌' }} |"
            echo "| ESLint          | ${{ steps.eslint.outcome       == 'success' && '✅' || steps.eslint.outcome       == 'skipped' && '⏭️' || '❌' }} |"
            echo "| TypeScript      | ${{ steps.typescript.outcome   == 'success' && '✅' || steps.typescript.outcome   == 'skipped' && '⏭️' || '❌' }} |"
          } >> "$GITHUB_STEP_SUMMARY"

      # ── Linked PR aggregate gate ────────────────────────────────────

      - name: Debug aggregate gate context
        if: always() && contains(format(',{0},', vars.PR_QA_ENABLED_JOBS), ',aggregate-linked-pr-checks,')
        run: |
          set -euo pipefail
          echo "PR_QA_ENABLED_JOBS='${{ vars.PR_QA_ENABLED_JOBS }}'"
          if [ -n "${CROSS_REPO_READ_TOKEN}" ]; then
            echo "CROSS_REPO_READ_TOKEN=present"
          else
            echo "CROSS_REPO_READ_TOKEN=missing"
          fi

      - name: Skip if cross-repo token is missing
        if: always() && contains(format(',{0},', vars.PR_QA_ENABLED_JOBS), ',aggregate-linked-pr-checks,') && env.CROSS_REPO_READ_TOKEN == ''
        run: |
          set -euo pipefail
          echo "CROSS_REPO_READ_TOKEN is not set. Skipping aggregate-linked-pr-checks."
          exit 0

      - name: Validate linked PR checks
        if: always() && contains(format(',{0},', vars.PR_QA_ENABLED_JOBS), ',aggregate-linked-pr-checks,') && env.CROSS_REPO_READ_TOKEN != ''
        uses: actions/github-script@v9
        with:
          github-token: ${{ env.CROSS_REPO_READ_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pr = context.payload.pull_request;
            const prNumber = pr.number;
            const body = pr.body || '';
            // Only scan the "Related Pull Requests" section, up to the placeholder comment.
            const sectionMatch = body.match(
              /###\s*Related Pull Requests\s*\n([\s\S]*?)(?=<!-- related pull request placeholder -->|\n###|$)/i
            );
            const section = (sectionMatch ? sectionMatch[1] : '').replace(/<!--[\s\S]*?-->/g, '');

            const linkRe = /https:\/\/github\.com\/([^/\s]+)\/([^/\s]+)\/pull\/(\d+)/g;
            const seen = new Set();
            const links = [];

            for (const m of section.matchAll(linkRe)) {
              const linkedOwner = m[1];
              const linkedRepo = m[2];
              const linkedPr = Number(m[3]);
              const key = `${linkedOwner}/${linkedRepo}#${linkedPr}`;
              if (seen.has(key)) continue;
              seen.add(key);

              if (linkedOwner === owner && linkedRepo === repo && linkedPr === prNumber) continue;
              if (linkedOwner !== owner) {
                core.notice(`Skipping ${key}: not in org ${owner}`);
                continue;
              }
              links.push({ owner: linkedOwner, repo: linkedRepo, number: linkedPr });
            }

            if (links.length === 0) {
              core.info('No linked PR URLs found in the Related Pull Requests section. Skipping aggregate gate.');
              return;
            }

            const okConclusions = new Set(['success', 'neutral', 'skipped']);
            const rows = [];
            let hasFailures = false;

            for (const link of links) {
              const label = `${link.owner}/${link.repo}#${link.number}`;
              try {
                const { data: linked } = await github.rest.pulls.get({
                  owner: link.owner,
                  repo: link.repo,
                  pull_number: link.number,
                });

                const sha = linked.head.sha;
                const prState = linked.state;

                const statusesResp = await github.rest.repos.listCommitStatusesForRef({
                  owner: link.owner,
                  repo: link.repo,
                  ref: sha,
                  per_page: 100,
                });
                const statuses = statusesResp.data || [];
                const badStatuses = statuses.filter(s => s.state !== 'success');

                const checksResp = await github.rest.checks.listForRef({
                  owner: link.owner,
                  repo: link.repo,
                  ref: sha,
                  per_page: 100,
                });
                const checkRuns = checksResp.data.check_runs || [];
                const badChecks = checkRuns.filter(c => c.status !== 'completed' || !okConclusions.has(c.conclusion || ''));

                const hasAnySignals = statuses.length > 0 || checkRuns.length > 0;
                const pass = prState === 'open' && hasAnySignals && badStatuses.length === 0 && badChecks.length === 0;

                if (!pass) hasFailures = true;

                rows.push({
                  pr: label,
                  state: prState,
                  totalStatuses: statuses.length,
                  failingStatuses: badStatuses.length,
                  totalChecks: checkRuns.length,
                  failingChecks: badChecks.length,
                  result: pass ? 'PASS' : 'FAIL',
                  error: null,
                });
              } catch (e) {
                hasFailures = true;
                rows.push({
                  pr: label,
                  state: 'unknown',
                  totalStatuses: 0,
                  failingStatuses: 0,
                  totalChecks: 0,
                  failingChecks: 0,
                  result: 'FAIL',
                  error: e.message,
                });
              }
            }

            const ciCell = r => {
              if (r.error) return `error: ${r.error}`;
              const parts = [];
              if (r.totalChecks > 0)
                parts.push(`${r.totalChecks} check run${r.totalChecks !== 1 ? 's' : ''}` +
                  (r.failingChecks > 0 ? `, ${r.failingChecks} failing` : ', all green'));
              if (r.totalStatuses > 0)
                parts.push(`${r.totalStatuses} status${r.totalStatuses !== 1 ? 'es' : ''}` +
                  (r.failingStatuses > 0 ? `, ${r.failingStatuses} failing` : ', all green'));
              return parts.length > 0 ? parts.join(' / ') : 'no signals';
            };

            // GitHub Actions summary: rendered as an HTML table
            await core.summary
              .addHeading('Linked PR Aggregate Report', 3)
              .addTable([
                ['Linked PR', 'State', 'CI', 'Result'].map(h => ({ data: h, header: true })),
                ...rows.map(r => [
                  r.pr,
                  r.state,
                  ciCell(r),
                  r.result === 'PASS' ? '✅ PASS' : '❌ FAIL',
                ]),
              ])
              .write();

            // Step log: plain text
            const logLines = rows.map(r =>
              `  ${r.result === 'PASS' ? '✅' : '❌'} ${r.pr}  [${r.state}]  ${ciCell(r)}`
            );
            const logReport = logLines.join('\n');

            if (hasFailures) {
              core.setFailed(`One or more linked PRs are not green:\n${logReport}`);
            } else {
              core.info(`All linked PRs are green:\n${logReport}`);
            }

